# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write      # Needed to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # YOUR TASK: Add steps to build and push all 3 images
      # For each service (gateway, events, payments):
      #   1. docker build -t ghcr.io/<your-username>/quickticket-<service>:${{ github.sha }} ./app/<service>
      #   2. docker push ghcr.io/<your-username>/quickticket-<service>:${{ github.sha }}
      #
      # Hint: ${{ github.sha }} gives the commit SHA — unique, immutable tag
      # Hint: Replace <your-username> with your GitHub username (lowercase)

      - name: Build gateway
        run: |
          docker build -t ghcr.io/${{ github.actor }}/quickticket-gateway:${{ github.sha }} ./app/gateway
          docker push ghcr.io/${{ github.actor }}/quickticket-gateway:${{ github.sha }}

      - name: Build events
        run: |
          docker build -t ghcr.io/${{ github.actor }}/quickticket-events:${{ github.sha }} ./app/events
          docker push ghcr.io/${{ github.actor }}/quickticket-events:${{ github.sha }}

      - name: Build payments
        run: |
          docker build -t ghcr.io/${{ github.actor }}/quickticket-payments:${{ github.sha }} ./app/payments
          docker push ghcr.io/${{ github.actor }}/quickticket-payments:${{ github.sha }}